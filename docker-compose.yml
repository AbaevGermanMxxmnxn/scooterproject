version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: whoosh-api

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://whoosh:whoosh@postgres:5432/whoosh
      REDIS_URL: redis://redis:6379

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:16

    container_name: whoosh-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: whoosh
      POSTGRES_USER: whoosh
      POSTGRES_PASSWORD: whoosh

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: whoosh-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4

    container_name: whoosh-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@whoosh.local
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data: